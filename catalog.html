<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MirasEthno - Catalog</title>
    <link rel="icon" href="/imagesformirasethno/mirasethnoproductsimages/aboutPhotos/mirasethnologo.png" type="image/png">
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/products-db.js"></script>
    <script defer src="/js/script.js"></script>
    <meta name="description" content="Авторские PDF-схемы ковров в казахском этно-стиле. Создавайте уютные интерьеры своими руками.">
    <meta property="og:title" content="MirasEthno — Схемы для вязания ковров">
    <meta property="og:description" content="Авторские PDF-схемы ковров в казахском этно-стиле.">
</head>
<body>
    <div class="header" id="header-placeholder"></div>

    <main class="catalog">

        <div class="container">

            <h1 class="catalog__title">Схемы для вязания ковров</h1>

            <p class="catalog__description">Откройте для себя коллекцию авторских схем с казахскими орнаментами — от простых и лаконичных до более детализированных и выразительных. Каждая схема продумана так, чтобы процесс вязания был понятным, а результат — аккуратным и эстетичным.</p>
            
            <div class="catalog__filters">
                <button class="filter-btn active" data-filter="all">Все</button>
                <button class="filter-btn" data-filter="related">Проверенные</button>
                <button class="filter-btn" data-filter="main">Дизайн-схемы</button>
                <button class="filter-btn" data-filter="mini">Мини-схемы</button>
                <button class="filter-btn" data-filter="geometry">Этно-геометрия</button>
                <button class="filter-btn" data-filter="zhainamaz">Жайнамаз</button>
            </div>

            <div class="catalog__grid" id="catalog-grid"></div>

        </div>

        <div id="footer-placeholder"></div>
    </main>
</body>
</html>
